<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Counter</title>

        <link rel="stylesheet"
            href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>

        <div class="container">

            <h1>Counter</h1>

            <h2>{{ session['count'] }}</h2>

            <div class="buttons">

                <a href="/add_two">+2</a>

                <a href="/reset">Reset</a>

            </div>

            <form action="/custom" method="POST">

                <input type="number" name="number" placeholder="Custom Number">

                <button type="submit">Add</button>

            </form>

        </div>

    </body>
</html>
