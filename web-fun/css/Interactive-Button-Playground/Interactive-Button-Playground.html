<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Interactive Button Playground</title>
        <link rel="stylesheet" href="./Interactive-Button-Playground.css">
    </head>
    <body>

        <div class="container">
            <h1>Interactive Button Playground</h1>

            <button class="btn hover-btn">Hover Me</button>
            <button class="btn active-btn">Press Me</button>
            <button class="btn focus-btn">Focus On Me</button>
            <button class="btn grow-btn">Hover to Grow</button>
            <button class="btn disabled-btn" disabled>Disabled Button</button>
        </div>

    </body>
</html>
