<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>StoryWorld</title>
        <link rel="stylesheet" href="./Story-Gallery.css" />
    </head>
    <body>
        <div class="page">

            <nav class="navbar">
                <h1 class="logo">StoryWorld</h1>

                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Categories</a></li>
                    <li><a href="#">Most Read</a></li>
                    <li><a href="#">About</a></li>
                </ul>

                <div class="profile">
                    <img src="..." />
                </div>
            </nav>

            <section class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput"
                        placeholder="Search stories..." />
                    <button id="searchBtn">Search</button>
                </div>

                <div class="filters">
                    <button class="filter-btn active"
                        data-category="all">All</button>
                    <button class="filter-btn"
                        data-category="adventure">Adventure</button>
                    <button class="filter-btn"
                        data-category="animals">Animals</button>
                    <button class="filter-btn"
                        data-category="fantasy">Fantasy</button>
                    <button class="filter-btn"
                        data-category="bedtime">Bedtime</button>
                    <button class="filter-btn"
                        data-category="learning">Learning</button>
                </div>
            </section>

            <section class="story-grid" id="storyGrid">
                <div class="card" data-category="animals"
                    data-title="The Star Whisperer">
                    <img
                        src="https://images.unsplash.com/photo-1516627145497-ae6968895b74?auto=format&fit=crop&w=800&q=80"
                        alt="The Star Whisperer">
                    <div class="overlay">
                        <h3>The Star Whisperer</h3>
                    </div>
                </div>

                <div class="card" data-category="adventure"
                    data-title="Adventure in the Sky">
                    <img
                        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80"
                        alt="Adventure in the Sky">
                    <div class="overlay">
                        <h3>Adventure in the Sky</h3>
                    </div>
                </div>

                <div class="card" data-category="fantasy"
                    data-title="Moonlight Woods">
                    <img
                        src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?auto=format&fit=crop&w=800&q=80"
                        alt="Moonlight Woods">
                    <div class="overlay">
                        <h3>Moonlight Woods</h3>
                    </div>
                </div>

                <div class="card" data-category="learning"
                    data-title="Book of Dreams">
                    <img
                        src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80"
                        alt="Book of Dreams">
                    <div class="overlay">
                        <h3>Book of Dreams</h3>
                    </div>
                </div>

                <div class="card" data-category="fantasy"
                    data-title="Secret Garden Path">
                    <img
                        src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?auto=format&fit=crop&w=800&q=80"
                        alt="Secret Garden Path">
                    <div class="overlay">
                        <h3>Secret Garden Path</h3>
                    </div>
                </div>

                <div class="card" data-category="adventure"
                    data-title="Rainbow Land">
                    <img
                        src="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=800&q=80"
                        alt="Rainbow Land">
                    <div class="overlay">
                        <h3>Rainbow Land</h3>
                    </div>
                </div>

                <div class="card" data-category="animals"
                    data-title="The Little Explorer">
                    <img
                        src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=800&q=80"
                        alt="The Little Explorer">
                    <div class="overlay">
                        <h3>The Little Explorer</h3>
                    </div>
                </div>

                <div class="card" data-category="bedtime"
                    data-title="Under the Big Tree">
                    <img
                        src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&w=800&q=80"
                        alt="Under the Big Tree">
                    <div class="overlay">
                        <h3>Under the Big Tree</h3>
                    </div>
                </div>

                <div class="card featured" data-category="bedtime"
                    data-title="Luna's Magic Star">
                    <img
                        src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=800&q=80"
                        alt="Luna's Magic Star">
                    <div class="overlay">
                        <h3>Luna's Magic Star</h3>
                    </div>
                </div>
            </section>

        </div>

        <script src="./Story-Gallery.js"></script>
    </body>
</html>
