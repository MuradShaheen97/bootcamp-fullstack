<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pseudo Effects</title>
        <link rel="stylesheet" href="./Contact-page.css">
    </head>
    <body>

        <div class="page">

            <section class="plans">
                <h1>Subscription Plans</h1>

                <div class="cards">

                    <div class="card">
                        <h3>Starter</h3>
                        <div class="price">$9/mo</div>
                        <ul>
                            <li>5 Projects Included</li>
                            <li>Email Support</li>
                            <li>Single User License</li>
                        </ul>
                    </div>

                    <div class="card">
                        <h3>Professional</h3>
                        <div class="price">$19/mo</div>
                        <ul>
                            <li>25 Projects</li>
                            <li>Priority Support</li>
                            <li>Team Access</li>
                        </ul>
                    </div>

                    <div class="card">
                        <h3>Enterprise</h3>
                        <div class="price">$49/mo</div>
                        <ul>
                            <li>Unlimited Projects</li>
                            <li>24/7 Support</li>
                            <li>Advanced Tools</li>
                        </ul>
                    </div>

                </div>
            </section>

            <section class="contact">
                <h2>Contact Us</h2>

                <form>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <textarea placeholder="Your Message..." required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </section>

        </div>

    </body>
</html>
