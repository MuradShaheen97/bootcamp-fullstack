<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Dashboard Shadows</title>
        <link rel="stylesheet" href="./Shadow.css">
    </head>
    <body>

        <div class="container">

            <!-- Sidebar -->
            <div class="sidebar">
                <h2>Dashboard</h2>
                <ul>
                    <li class="active">Overview</li>
                    <li>Analytics</li>
                    <li>Messages</li>
                    <li>Settings</li>
                </ul>
            </div>

            <!-- Main -->
            <div class="main">
                <h1>Overview</h1>

                <div class="cards">

                    <div class="card">Revenue<br>$4,280</div>
                    <div class="card">Users<br>182</div>
                    <div class="card">Orders<br>97</div>

                    <div class="card inset">Active Users</div>
                    <div class="card multi">Messages</div>

                </div>
            </div>

        </div>

    </body>
</html>
