<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Responsive Elements Showcase</title>
        <link rel="stylesheet" href="./Height-and-Math.css">
    </head>

    <body>

        <h1>Responsive Elements Showcase</h1>

        <!-- CARD 1 -->
        <div class="card">
            <div class="section-title">1. Shrinking Image</div>
            <img src
                class="alfaromeo">

        <!-- CARD 2 -->
        <div class="card">

        <div class="card">

        </div>

        <!-- CARD 5 -->
        <div class="card">
            <div class="section-title">5. Resizable Box</div>
            <div class="resize-box"></div>
        </div>
