<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>DOM Family Explorer</title>
        <link rel="stylesheet" href="./DOMFamily.css">
    </head>
    <body>

        <h1>DOM Family Explorer</h1>

        <div class="container" id="container">
            <div class="box" id="a">A</div>
            <div class="box" id="b">B</div>
            <div class="box" id="c">C</div>
        </div>

        <div class="buttons">
            <button onclick="showParent()">Show Parent of B</button>
            <button onclick="showChildren()">Show Children of Container</button>
            <button onclick="showSiblings()">Show Siblings of B</button>
        </div>

        <div id="result">Result will appear here...</div>

        <script src="./DOMFamily.js"></script>
    </body>
</html>
