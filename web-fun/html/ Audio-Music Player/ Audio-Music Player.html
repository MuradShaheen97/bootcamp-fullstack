<!DOCTYPE html>
<html>
    <head>
        <title>Music Player</title>
        <link rel="stylesheet" href="./ Audio-Music Player.css">
    </head>
    <body>

        <div class="container">

            <!-- LEFT: PLAYER -->
            <div class="player">
                <h2>Now Playing</h2>
                <p id="title">Song 1</p>

                <audio id="audio" controls>
                    <source src="song1.mp3" type="audio/mpeg">
                    <source src="song1.ogg" type="audio/ogg">
                </audio>
            </div>

            <!-- RIGHT: PLAYLIST -->
            <div class="playlist">
                <h3>Playlist</h3>

                <div onclick="playSong('song1.mp3','Song 1')">Song 1</div>
                <div onclick="playSong('song2.mp3','Song 2')">Song 2</div>
                <div onclick="playSong('song3.mp3','Song 3')">Song 3</div>

            </div>

        </div>

        <script src="./ Audio-Music Player.js"></script>
    </body>
</html>
