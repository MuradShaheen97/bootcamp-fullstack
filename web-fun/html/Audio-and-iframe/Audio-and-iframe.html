<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>StudyHub Homework Center</title>
        <link rel="stylesheet" href="./Audio-and-iframe.css">
    </head>
    <body>

        <div class="navbar">
            <h2>StudyHub</h2>
        </div>

        <div class="container">

            <div class="sidebar">
                <h3>StudyHub</h3>
                <p>Home</p>
                <p>My Results</p>
                <p>Submissions</p>
                <p><b>Homeworks</b></p>
                <p>Settings</p>
            </div>

            <div class="content">

                <div class="box">
                    <h3>Teacher Explanation</h3>
                    <p>Listen to the homework instructions.</p>

                    <audio controls>
                        <source
                            src="./audio/that-happy-feeling_loop-01.wav"
                            type="audio/mpeg">
                        <source src="./audio/that-happy-feeling_loop-01.wav"
                            type="audio/ogg">
                    </audio>
                </div>

                <div class="box">
                    <h3>Homework Document</h3>
                    <p>Your homework file:</p>

                    <iframe src="./audio/maxresdefault.jpg" width="100%"
                        height="400"
                        title="Homework PDF"></iframe>
                </div>

            </div>

        </div>

    </body>
</html>
