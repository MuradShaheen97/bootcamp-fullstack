<!DOCTYPE html>
<html>

        <title>murad House</title>

    <body>
        <div>

                <!-- land -->

                <!-- House -->
                <rect x="120" y="120" width="160" height="130" fill="red"

                <!-- stelang -->
                <polygon points="120,120 200,60 280,120" fill="yellow"

                <!-- door -->
                <rect x="190" y="180" width="40" height="70" fill="black" />

                <!-- wendo -->

                    stroke="black" />

                <!-- sun -->
                <circle cx="320" cy="80" r="30" fill="orange" />

            </svg>
        </div>
