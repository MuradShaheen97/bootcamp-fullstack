{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="{% static 'Dojos_and_Ninjas/style.css'%}">
    </head>
    <body>
        <div>
            <form action="{%url 'Dojos_and_Ninjas:dojos'%}"method="post ">
                {%csrf_token%}
                <h1>Add a dojo</h1>
                <label for="name">name</label>
                <input type="text" name="name">
                <label for="city">city</label>
                <input type="text" name="city">
                <label for="state">state</label>
                <input type="text" name="state">
                <button type="submit">Add dojo </button>
            </form>
            <form action="{%url 'Dojos_and_Ninjas:ninjas'%}" method="post">
                {%csrf_token%}
                <h1>Add a ninja</h1>
                <label for="firstname">firstname</label>
                <input type="text" name="firstname">
                <label for="lastname">lastname</label>
                <input type="text" name="lastname">
                <label for="select">select</label>
                <select name="dojo">
                    {% for dojo in dojos %}
                    <option value="{{ dojo.id }}">{{ dojo.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Add ninja </button>
            </form>
        </div>
        {% for dojo in dojos %}
        <section>
            <div>
                <h1>{{dojo.name }}</h1>
                <span>total: {{dojo.ninjas.count}}</span>
            </div>
            <div>
                <form action="{%url 'Dojos_and_Ninjas:delete'%}" method="post">
                    {%csrf_token%}
                    <input type="hidden" name="dojoid" value="{{dojo.id}}">
                    <button type="submit">delete</button>
                </form>
            </div>
            <ul>
                {% for ninja in dojo.ninjas.all %}
                <li>{{ninja.firstname}} {{ninja.lastname}}</li>
                {% endfor %}
            </ul>

        </section>
        {% endfor %}
    </body>
</html>
