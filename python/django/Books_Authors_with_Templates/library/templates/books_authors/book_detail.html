<!DOCTYPE html>
<html>
    <head>
        <title>Book Details</title>
    </head>
    <body>

        <h1>{{ book.title }}</h1>

        <p>ID: {{ book.id }}</p>

        <p>Description:</p>

        <p>{{ book.desc }}</p>

        <hr>

        <h2>Authors</h2>

        <ul>
            {% for author in book.authors.all %}
            <li>
                {{ author.first_name }}
                {{ author.last_name }}
            </li>
            {% endfor %}
        </ul>

        <hr>

        <h2>Add Author</h2>

        <form action="/library/books/{{ book.id }}/add_author/" method="POST">
            {% csrf_token %}

            <select name="author_id">

                {% for author in authors %}
                <option value="{{ author.id }}">
                    {{ author.first_name }}
                    {{ author.last_name }}
                </option>
                {% endfor %}

            </select>

            <button type="submit">
                Add
            </button>

        </form>

        <br>

        <a href="/library/books/">
            Back
        </a>

    </body>
</html>
