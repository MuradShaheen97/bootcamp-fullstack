<!DOCTYPE html>
<html>
    <head>
        <title>Books</title>
    </head>
    <body>

        <h1>Add a Book</h1>

        <form action="/library/books/create/" method="POST">
            {% csrf_token %}

            <p>Title</p>
            <input type="text" name="title">

            <p>Description</p>
            <textarea name="desc"></textarea>

            <br><br>

            <button type="submit">Add</button>
        </form>

        <hr>

        <h1>All Books</h1>

        <table border="1">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Action</th>
            </tr>

            {% for book in books %}
            <tr>
                <td>{{ book.id }}</td>
                <td>{{ book.title }}</td>
                <td>
                    <a href="/library/books/{{ book.id }}/">
                        View
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>

        <br>

        <a href="/library/authors/">
            Go To Authors
        </a>

    </body>
</html>
