<!DOCTYPE html>
<html>
    <head>
        <title>Author Details</title>
    </head>
    <body>

        <h1>
            {{ author.first_name }}
            {{ author.last_name }}
        </h1>

        <p>ID: {{ author.id }}</p>

        <p>Notes:</p>

        <p>{{ author.notes }}</p>

        <hr>

        <h2>Books</h2>

        <ul>

            {% for book in author.books.all %}
            <li>{{ book.title }}</li>
            {% endfor %}

        </ul>

        <hr>

        <h2>Add Book</h2>

        <form action="/library/authors/{{ author.id }}/add_book/" method="POST">
            {% csrf_token %}

            <select name="book_id">

                {% for book in books %}
                <option value="{{ book.id }}">
                    {{ book.title }}
                </option>
                {% endfor %}

            </select>

            <button type="submit">
                Add
            </button>

        </form>

        <br>

        <a href="/library/authors/">
            Back
        </a>

    </body>
</html>
